name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Python syntax + import check ──────────────────────────────────
  python-check:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [api, webhooks, workers]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r apps/${{ matrix.service }}/requirements.txt

      - name: Compile check (syntax)
        run: |
          python -m py_compile apps/${{ matrix.service }}/app/main.py || \
          python -m py_compile apps/${{ matrix.service }}/src/main.py

      - name: Import check
        run: |
          cd apps/${{ matrix.service }}
          python -c "
          import importlib, pkgutil, sys, os
          pkg = 'app' if os.path.isdir('app') else 'src'
          errors = []
          for importer, modname, ispkg in pkgutil.walk_packages([pkg], prefix=f'{pkg}.'):
              try:
                  importlib.import_module(modname)
              except Exception as e:
                  errors.append(f'{modname}: {e}')
          if errors:
              for e in errors:
                  print(f'FAIL: {e}', file=sys.stderr)
              sys.exit(1)
          print(f'OK: all modules in {pkg}/ import cleanly')
          "

  # ── Dashboard TypeScript + build ──────────────────────────────────
  dashboard-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/dashboard/package-lock.json

      - name: Install dependencies
        working-directory: apps/dashboard
        run: npm ci

      - name: TypeScript check
        working-directory: apps/dashboard
        run: npx tsc --noEmit

      - name: Build
        working-directory: apps/dashboard
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder
          NEXT_PUBLIC_API_URL: http://localhost:8080
        run: npm run build

  # ── Docker build validation ───────────────────────────────────────
  docker-build:
    runs-on: ubuntu-latest
    needs: [python-check, dashboard-build]
    strategy:
      matrix:
        include:
          - context: apps/api
            image: re-api
          - context: apps/webhooks
            image: re-webhooks
          - context: apps/workers
            image: re-workers
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: |
          docker build -t revenueedge/${{ matrix.image }}:ci \
            ${{ matrix.context }}

  # ── Lint smoke scripts ────────────────────────────────────────────
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: ShellCheck
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq shellcheck
          shellcheck scripts/*.sh || true
